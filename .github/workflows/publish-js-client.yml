name: Publish JS client

# Manually publishes the zero-dependency JS/TS client as an auth-free GitHub
# Release asset — no npm registry, no token. Every run auto-increments the patch in
# clients/js/package.json, commits the bump back, then packs
# openviglet-models-catalog-client-<version>.tgz and attaches it to a `js-v<version>`
# Release, so anyone can install it straight from the public repo:
#
#   npm install https://github.com/openviglet/models-catalog/releases/download/js-v<version>/openviglet-models-catalog-client-<version>.tgz
#
# No inputs — just dispatch it. The version is derived, never typed, so the tag and
# asset URL can never drift from package.json.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-js-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/js
        run: |
          set -euo pipefail
          NEW=$(npm version patch --no-git-tag-version | tr -d 'v')
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped JS client to $NEW"

      # Zero-dependency: no `npm ci` — tests and `npm pack` need nothing installed.
      - name: Test (publish gate)
        working-directory: clients/js
        run: node --test

      - name: Pack tarball
        working-directory: clients/js
        run: npm pack

      - name: Commit version bump
        run: |
          set -euo pipefail
          git add clients/js/package.json
          git commit -m "chore(release): js client v${NEW_VERSION} [skip ci]"
          git push

      - name: Create Release + attach tarball
        working-directory: clients/js
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="js-v${NEW_VERSION}"
          gh release create "$TAG" ./*.tgz \
            --repo "$GITHUB_REPOSITORY" \
            --target "$(git rev-parse HEAD)" \
            --title "JS/TS client ${TAG#js-}" \
            --notes "Zero-dependency \`@openviglet/models-catalog-client\` tarball. Public, no auth — \`npm install <this asset's URL>\`." \
          || gh release upload "$TAG" ./*.tgz --repo "$GITHUB_REPOSITORY" --clobber
