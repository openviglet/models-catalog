name: Publish Java client

# Manually publishes the no-runtime-dep Java client as an auth-free GitHub Release —
# no Maven Central, no token. The unauthenticated install path is JitPack building
# the tag this job creates (root jitpack.yml pins the clients/java module to it):
#
#   com.github.openviglet.models-catalog:models-catalog-client:java-v<version>
#
# Every run auto-increments the patch in clients/java/pom.xml, commits the bump back,
# then (after `mvn verify` passes) creates that `java-v<version>` tag via the Release
# and attaches the built jar for direct download. No inputs — just dispatch it; the
# version is derived, never typed.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-java-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/java
        run: |
          set -euo pipefail
          CUR=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          IFS=. read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA + 1))"
          mvn -B -q versions:set -DnewVersion="$NEW" -DgenerateBackupPoms=false
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped Java client to $NEW"

      - name: Build + test (publish gate)
        working-directory: clients/java
        run: mvn -B verify

      - name: Commit version bump
        run: |
          set -euo pipefail
          git add clients/java/pom.xml
          git commit -m "chore(release): java client v${NEW_VERSION} [skip ci]"
          git push

      - name: Create Release + attach jar
        working-directory: clients/java
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="java-v${NEW_VERSION}"
          gh release create "$TAG" ./target/models-catalog-client-*.jar \
            --repo "$GITHUB_REPOSITORY" \
            --target "$(git rev-parse HEAD)" \
            --title "Java client ${TAG#java-}" \
            --notes "No-runtime-dep \`io.github.openviglet:models-catalog-client\`. Public, no auth — depend on \`com.github.openviglet.models-catalog:models-catalog-client:$TAG\` via JitPack, or download the attached jar." \
          || gh release upload "$TAG" ./target/models-catalog-client-*.jar --repo "$GITHUB_REPOSITORY" --clobber
