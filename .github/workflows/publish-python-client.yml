name: Publish Python client

# Manually publishes the stdlib-only Python client as an auth-free GitHub Release —
# no PyPI, no token. GitHub hosts no pip index, so the unauthenticated install path
# is the tag itself:
#
#   pip install "git+https://github.com/openviglet/models-catalog.git@py-v<version>#subdirectory=clients/python"
#
# Every run auto-increments the patch in clients/python/pyproject.toml, commits the
# bump back, then creates that `py-v<version>` tag (via the Release) and attaches a
# built sdist + wheel for offline/mirror installs. No inputs — just dispatch it; the
# version is derived, never typed.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-python-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/python
        run: |
          set -euo pipefail
          CUR=$(grep -m1 -oP '(?<=^version = ")[0-9]+\.[0-9]+\.[0-9]+' pyproject.toml)
          IFS=. read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA + 1))"
          sed -i -E "s/^version = \"$CUR\"/version = \"$NEW\"/" pyproject.toml
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped Python client to $NEW"

      # Client runtime is stdlib-only; `build` is a CI-only tool, never a client dep.
      - name: Test (publish gate)
        working-directory: clients/python
        run: python -m unittest discover -s tests

      - name: Build sdist + wheel
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Commit version bump
        run: |
          set -euo pipefail
          git add clients/python/pyproject.toml
          git commit -m "chore(release): python client v${NEW_VERSION} [skip ci]"
          git push

      - name: Create Release + attach dist
        working-directory: clients/python
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="py-v${NEW_VERSION}"
          gh release create "$TAG" ./dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$(git rev-parse HEAD)" \
            --title "Python client ${TAG#py-}" \
            --notes "Stdlib-only \`openviglet-models-catalog-client\`. Public, no auth — \`pip install \"git+https://github.com/openviglet/models-catalog.git@$TAG#subdirectory=clients/python\"\` (or install an attached wheel)." \
          || gh release upload "$TAG" ./dist/* --repo "$GITHUB_REPOSITORY" --clobber
