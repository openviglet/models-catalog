# JitPack build config — lets anyone consume the Java client straight from the
# public GitHub repo with no authentication (https://jitpack.io).
#
# The client lives in clients/java/, so JitPack can't auto-detect it from the
# root. This install step builds that module and copies the jar into ~/.m2, where
# JitPack picks it up. $VERSION is the ref being built (tag / branch / commit); we
# pin the artifact to it so the version consumers request resolves exactly.
#
# Consumers depend on it as a multi-module artifact — group = com.github.<user>.<repo>,
# artifactId = the module's own artifactId:
#
#   com.github.openviglet.models-catalog:models-catalog-client:<tag>
#
# See clients/java/README.md for the full snippet.
jdk:
  - openjdk17
install:
  - cd clients/java && mvn -B -q versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false && mvn -B -q -DskipTests install
